<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prode 2026</title>
<link rel="icon" href="https://img.icons8.com/emoji/48/soccer-ball-emoji.png" type="image/png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{width:100%;min-height:100%;overflow-x:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#000}
body{position:relative}
body.has-pay-banner{padding-top:118px}
#videoBG{position:fixed;inset:0;z-index:0;overflow:hidden;background:#000}
.bg-video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity 1s ease-in-out}
.bg-video.active{opacity:1}
.bg-overlay{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(rgba(0,0,0,0.25), rgba(0,0,0,0.25))}
.screen{display:none;position:relative;z-index:5}
.screen.active{display:block}
.login-wrap{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:24px}
.login-top{text-align:center;margin-bottom:28px}
.login-top h1{color:#fff;font-size:32px;font-weight:800;letter-spacing:2px;text-shadow:0 4px 15px rgba(0,0,0,0.8)}
.login-top p{color:#a3e635;font-size:14px;font-weight:600;text-transform:uppercase}
.login-card{background:rgba(255,255,255,0.1);backdrop-filter:blur(15px);-webkit-backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.2);border-radius:24px;padding:30px;width:100%;max-width:360px}
.field-label{font-size:11px;color:#fff;display:block;margin-bottom:5px;font-weight:700;text-transform:uppercase}
.glass-input{width:100%;padding:14px;border-radius:12px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.5);color:#fff;font-size:16px;outline:none;margin-bottom:15px}
.btn-login{width:100%;padding:15px;border-radius:12px;border:none;background:#16a34a;color:#fff;font-size:16px;font-weight:800;cursor:pointer;box-shadow:0 4px 20px rgba(0,0,0,0.4)}
.admin-trigger{position:fixed;bottom:0;right:0;width:80px;height:80px;background:transparent;border:none;cursor:pointer;z-index:9999}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.85);backdrop-filter:blur(5px);z-index:10000;display:flex;align-items:center;justify-content:center;padding:16px}
.modal-overlay.hidden{display:none}
.modal-card{background:#111;border-radius:20px;padding:25px;width:100%;max-width:320px;border:1px solid #16a34a;text-align:center}
.modal-title{color:#fff;font-size:18px;font-weight:700;margin-bottom:6px}
.dark-input{width:100%;padding:12px;border-radius:12px;border:1px solid #222;background:#000;color:#fff;font-size:18px;outline:none;margin-bottom:14px;text-align:center;letter-spacing:4px}
.modal-close{background:none;border:none;color:#666;font-size:13px;cursor:pointer;margin-top:12px;text-decoration:underline}
.header{background:rgba(0,0,0,0.72);padding:16px;position:sticky;top:0;z-index:10;border-bottom:1px solid #16a34a}
.header h1{color:#fff;font-size:18px}
.stats-row{display:flex;gap:8px;margin-top:10px}
.stat-pill{flex:1;background:rgba(22,163,74,0.2);border-radius:12px;padding:8px;text-align:center;border:1px solid rgba(22,163,74,0.3)}
.stat-val{color:#fff;font-size:20px;font-weight:700}
.stat-lab{color:#a3e635;font-size:10px;text-transform:uppercase}
.tabs{display:flex;background:#fff;position:sticky;top:105px;z-index:9}
.tab{flex:1;padding:15px;font-size:14px;border:none;background:transparent;color:#666;font-weight:700}
.tab.active{color:#16a34a;border-bottom:3px solid #16a34a}
.content{padding:12px 12px 100px;position:relative;z-index:6}
.card{background:#fff;border-radius:18px;margin-bottom:15px;box-shadow:0 8px 20px rgba(0,0,0,0.2);overflow:hidden}
.card-header{padding:10px 15px;background:#f8fafc;font-size:12px;color:#64748b;font-weight:600;border-bottom:1px solid #eee;display:flex;justify-content:space-between}
.fecha-badge{background:#e2e8f0;color:#334155;padding:2px 8px;border-radius:6px;font-weight:700;font-size:10px;text-transform:uppercase}
.card-body{padding:15px}
.equipos{display:flex;align-items:center;justify-content:space-between;margin-bottom:15px}
.equipo{flex:1;text-align:center}
.escudo-img{width:50px;height:50px;object-fit:contain;margin-bottom:5px}
.equipo-nom{font-size:13px;font-weight:700;color:#1e293b}
.vs-box{font-size:22px;font-weight:900;color:#16a34a;padding:0 10px}
.pron-controles{display:flex;align-items:center;justify-content:center;gap:15px;margin-bottom:12px}
.gol-num{width:45px;height:45px;border-radius:12px;background:#1e293b;color:#fff;font-size:24px;font-weight:700;display:flex;align-items:center;justify-content:center}
.gol-btn{width:35px;height:35px;border-radius:50%;border:2px solid #1e293b;background:#fff;font-size:20px;font-weight:700;cursor:pointer}
.guardar-btn{width:100%;padding:12px;border-radius:12px;border:none;background:#16a34a;color:#fff;font-weight:700;cursor:pointer}
.guardar-btn.enviado{background:#059669;cursor:not-allowed;opacity:0.7;pointer-events:none}
.pay-banner-fixed{position:fixed;top:0;left:0;right:0;z-index:20000;background:rgba(255,255,255,0.98);border-bottom:2px solid #dc2626;box-shadow:0 4px 14px rgba(0,0,0,0.15)}
.pay-banner-inner{padding:14px;text-align:center;color:#991b1b;font-weight:600}
.pos-row{display:flex;align-items:center;padding:12px 15px;border-bottom:1px solid #eee}
.pos-num{width:30px;font-weight:800;color:#16a34a}
.pos-nombre{flex:1;font-weight:600}
.pos-pts{font-weight:800;font-size:16px}
.admin-section{background:#fff;padding:15px;border-radius:15px;margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,0.1)}
.admin-section h3{font-size:16px;color:#16a34a;margin-bottom:12px;border-bottom:1px solid #eee;padding-bottom:5px}
.admin-row{padding:10px 0;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.num-input{width:55px;padding:8px;border-radius:8px;border:1px solid #ccc;text-align:center;margin-right:5px;font-size:16px;font-weight:700}
.admin-btn{background:#16a34a;color:#fff;border:none;padding:10px 14px;border-radius:8px;font-weight:700;cursor:pointer}
.user-panel-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f1f5f9}
.user-info-box{display:flex;flex-direction:column}
.toggle-pay-btn{padding:8px 14px;border-radius:8px;border:none;font-size:12px;font-weight:700;cursor:pointer;color:#fff;min-width:110px}
.btn-pay-active{background:#16a34a}
.btn-pay-blocked{background:#dc2626}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;color:#fff;padding:10px 20px;border-radius:50px;font-size:13px;z-index:20000;opacity:0;transition:0.3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div id="videoBG"></div>
<div class="bg-overlay"></div>

<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-top">
      <div style="font-size:60px">⚽</div>
      <h1>PRODE 2026</h1>
      <p>Torneo Argentino</p>
    </div>
    <div class="login-card">
      <label class="field-label" for="loginNombre">Nombre y Apellido</label>
      <input class="glass-input" id="loginNombre" type="text" placeholder="Ej: Hernán Pérez" autocomplete="name">
      <label class="field-label" for="loginEmail">Email</label>
      <input class="glass-input" id="loginEmail" type="email" placeholder="ejemplo@correo.com" autocomplete="email">
      <button class="btn-login" id="loginBtn" onclick="doLogin()">Entrar a Jugar →</button>
    </div>
  </div>
</div>

<div id="appScreen" class="screen">
  <div id="payBannerContainer"></div>
  <div class="header">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <h1 id="headerNombre">¡Hola!</h1>
      <button onclick="location.reload()" style="background:none;border:none;color:#a3e635;font-weight:700">Salir</button>
    </div>
    <div class="stats-row" id="statsRow">
      <div class="stat-pill"><div class="stat-val" id="statPts">0</div><div class="stat-lab">Puntos</div></div>
      <div class="stat-pill"><div class="stat-val" id="statPend">0</div><div class="stat-lab">Pendientes</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabPartidosBtn" onclick="switchTab('partidos',this)">Partidos</button>
    <button class="tab" id="tabPosicionesBtn" onclick="switchTab('posiciones',this)">⚽ Posiciones</button>
    <button class="tab" id="adminTabBtn" onclick="switchTab('admin',this)" style="display:none">⚙ ADMIN</button>
  </div>

  <div id="tabPartidos" class="content"></div>
  <div id="tabPosiciones" class="content" style="display:none"></div>
  <div id="tabAdmin" class="content" style="display:none"></div>
</div>

<button class="admin-trigger" onclick="abrirModalPin()"></button>

<div class="modal-overlay hidden" id="pinModal">
  <div class="modal-card">
    <div class="modal-title">🔓 Panel de Control</div>
    <p style="color:#666;font-size:13px;margin-bottom:15px">Ingresá el PIN de administrador</p>
    <input class="dark-input" id="inputPin" type="password" placeholder="••••" maxlength="4">
    <button class="btn-login" style="background:#16a34a" onclick="verificarPinAdmin()">Ingresar Directo</button>
    <button class="modal-close" onclick="cerrarModalPin()">Cancelar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL='https://script.google.com/macros/s/AKfycbyhfDoyVrHe_8Fn0sGkA4RxthTFpgJz0-yeeVNpBcJk7N-aLRuAFn4wew-eVeEEgNU2Qg/exec';
const ADMIN_PIN='1234';
const CONFIG={mp:'prode.hernan.mp',precio:'$2000'};
const VIDEO_FILES=['video1.mp4','video2.mp4','video3.mp4','video4.mp4'];
const VIDEO_DURATION_MS=5000, FADE_MS=1000, VIDEO_POSTER='poster.jpg';
let WHATSAPP_NUMERO=localStorage.getItem('whatsapp_prode')||'5491100000000';
let adminFiltro='todos';

const ESCUDOS={
'Aldosivi':'escudos/Aldosivi.png','Argentinos Juniors':'escudos/Argentinos Juniors.png','Atletico Tucuman':'escudos/Atletico Tucuman.png',
'Banfield':'escudos/Banfield.png','Barracas Central':'escudos/Barracas Central.png','Belgrano (cba)':'escudos/Belgrano (cba).png',
'Boca Juniors':'escudos/Boca Juniors.png','Central Cordoba':'escudos/Central Cordoba.png','Defensa y Justicia':'escudos/Defensa y Justicia.png',
'Deportivo Riestra':'escudos/Deportivo Riestra.png','Estudiantes de La Plata':'escudos/Estudiantes de La Plata.png',
'Estudiantes de Rio Cuarto':'escudos/Estudiantes de Rio Cuarto.png','Gimnasia y Esgrima de La Plata':'escudos/Gimnasia y Esgrima de La Plata.png',
'Gimnasia y Esgrima de Mendoza':'escudos/Gimnasia y Esgrima de Mendoza.png','Huracan':'escudos/Huracan.png',
'Independiente':'escudos/Independiente.png','Independiente Rivadavia':'escudos/Independiente Rivadavia.png','Instituto':'escudos/Instituto.png',
'Lanus':'escudos/Lanus.png','Newells Old Boys':'escudos/Newells Old Boys.png','Platense':'escudos/Platense.png',
'Racing Club':'escudos/Racing Club.png','River Plate':'escudos/River Plate.png','Rosario Central':'escudos/Rosario Central.png',
'San Lorenzo de Almagro':'escudos/San Lorenzo de Almagro.png','Sarmiento de Junin':'escudos/Sarmiento de Junin.png',
'Talleres de Cordoba':'escudos/Talleres de Cordoba.png','Tigre':'escudos/Tigre.png','Union de Santa Fe':'escudos/Union de Santa Fe.png',
'Velez Sarfield':'escudos/Velez Sarfield.png'
};

let usuario=null,email=null,esAdmin=false,usuarioActivo=false;
let partidos=[],pronos={},posiciones=[],golesTemp={};
let activeVideo=null,videoIndex=0;

function initVideoBackground(){
  const bg=document.getElementById('videoBG');
  function createVideo(src){
    const v=document.createElement('video');
    v.src=src; v.className='bg-video'; v.autoplay=true; v.muted=true; v.loop=false; v.playsInline=true; v.preload='auto'; v.poster=VIDEO_POSTER;
    return v;
  }
  function playNext(){
    const src=VIDEO_FILES[videoIndex%VIDEO_FILES.length];
    const next=createVideo(src);
    bg.appendChild(next);
    requestAnimationFrame(()=>next.classList.add('active'));
    if(activeVideo){
      activeVideo.classList.remove('active');
      const old=activeVideo;
      setTimeout(()=>{ if(old&&old.parentNode) old.remove(); }, FADE_MS+100);
    }
    next.play().catch(()=>{});
    activeVideo=next;
    setTimeout(()=>{ videoIndex++; playNext(); }, VIDEO_DURATION_MS-FADE_MS);
  }
  playNext();
}

function abrirModalPin(){document.getElementById('pinModal').classList.remove('hidden');document.getElementById('inputPin').focus()}
function cerrarModalPin(){document.getElementById('pinModal').classList.add('hidden');document.getElementById('inputPin').value=''}

async function verificarPinAdmin(){
  const pin=document.getElementById('inputPin').value.trim();
  if(pin!==ADMIN_PIN){showToast('PIN Incorrecto ❌');return}
  cerrarModalPin(); esAdmin=true; if(!usuario) usuario='Administrador'; showToast('Conectando Panel de Control... 👑');
  try{
    const res=await Promise.all([fetch(API_URL+'?accion=getPartidos').then(r=>r.json()),fetch(API_URL+'?accion=getPosiciones').then(r=>r.json())]);
    partidos=res[0].partidos; posiciones=res[1].posiciones;
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    document.getElementById('headerNombre').textContent='¡Hola, Hernán! (Admin)';
    document.getElementById('adminTabBtn').style.display='block';
    renderAll();
    switchTab('admin',document.getElementById('adminTabBtn'));
  }catch(e){showToast('Error de conexión')}
}

async function doLogin(){
  const n=document.getElementById('loginNombre').value.trim();
  const m=document.getElementById('loginEmail').value.trim();
  if(!n||!m.includes('@')){showToast('Completá nombre y email');return}
  usuario=n; email=m;
  document.getElementById('loginBtn').disabled=true;
  document.getElementById('loginBtn').textContent='Conectando...';
  try{
    await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'registrarUsuario',usuario,email})});
    const res=await Promise.all([fetch(API_URL+'?accion=getPartidos').then(r=>r.json()),fetch(API_URL+'?accion=getPronosticos&usuario='+usuario).then(r=>r.json()),fetch(API_URL+'?accion=getPosiciones').then(r=>r.json())]);
    partidos=res[0].partidos; pronos=res[1].pronosticos; posiciones=res[2].posiciones;
    document.getElementById('loginScreen').classList.remove('active');
    document.getElementById('appScreen').classList.add('active');
    document.getElementById('headerNombre').textContent='¡Hola, '+n.split(' ')[0]+'!';
    usuarioActivo=false;
    sessionStorage.setItem('payBannerShown','1');
    document.body.classList.add('has-pay-banner');
    renderAll();
  }catch(e){
    showToast('Error al conectar con Sheets');
    document.getElementById('loginBtn').disabled=false;
    document.getElementById('loginBtn').textContent='Entrar a Jugar →';
  }
}

function switchTab(t,btn){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tabPartidos').style.display=t==='partidos'?'block':'none';
  document.getElementById('tabPosiciones').style.display=t==='posiciones'?'block':'none';
  document.getElementById('tabAdmin').style.display=t==='admin'?'block':'none';
  if(t==='admin') renderAdmin();
}

function renderPaymentBanner(){
  if(sessionStorage.getItem('payBannerShown')!=='1' || usuarioActivo) return '';
  return `
    <div class="pay-banner-fixed">
      <div class="pay-banner-inner">
        <div style="font-size:14px;font-weight:900;margin-bottom:4px;">🔒 PAGO PENDIENTE</div>
        <div style="font-size:12px;margin-bottom:3px;">Monto: ${CONFIG.precio}</div>
        <div style="font-size:12px;font-weight:700;margin-bottom:10px;">Alias: ${CONFIG.mp}</div>
        <a href="https://wa.me/${WHATSAPP_NUMERO}?text=${encodeURIComponent('Hola, quiero informar mi pago del prode. Nombre: ' + (usuario||'') + ' | Email: ' + (email||'') + ' | Alias: ' + CONFIG.mp)}" target="_blank" style="text-decoration:none">
          <button class="guardar-btn" style="background:#25D366">Informar pago</button>
        </a>
      </div>
    </div>`;
}

function cambiarWhatsAppDesdeAdmin(){
  const nuevo=prompt('Nuevo número de WhatsApp en formato internacional, solo dígitos:', WHATSAPP_NUMERO);
  if(nuevo===null) return;
  const limpio=nuevo.replace(/\D/g,'');
  if(!limpio||limpio.length<10){showToast('Número inválido');return}
  WHATSAPP_NUMERO=limpio;
  localStorage.setItem('whatsapp_prode', WHATSAPP_NUMERO);
  showToast('WhatsApp actualizado');
  renderAll();
}

function renderPartidos(){
  let html=''; const ahora=new Date(); const banner=renderPaymentBanner();
  partidos.forEach((p,idx)=>{
    const pr=pronos[p.id], tiene=pr!==undefined;
    const gt=golesTemp[p.id]||{l:tiene?pr.l:0,v:tiene?pr.v:0};
    let cerrado=false;
    if(p.fecha.includes('/')){
      const parts=p.fecha.split('·');
      const dm=parts[0].trim().split(' ')[1].split('/');
      const hm=parts[1].trim().split(':');
      const fPart=new Date(2026, dm[1]-1, dm[0], hm[0], hm[1]);
      if((fPart-ahora)/60000<=10) cerrado=true;
    }
    const suspendido=p.jugado==='Suspendido';
    const jugado=p.jugado==='Jugado'||p.jugado===true||p.jugado==='TRUE';
    let ui='';
    if(suspendido){
      ui=`<p style="color:red;text-align:center;font-weight:700">❌ PARTIDO SUSPENDIDO</p>`;
    }else if(jugado){
      ui=`<div style="text-align:center;color:#16a34a;font-weight:bold">Resultado real: ${p.golesL}-${p.golesV}</div>`;
    }else if(cerrado){
      ui=`<p style="text-align:center;color:#666">⏰ Tiempo agotado</p>`;
    }else{
      const blockAttr=usuarioActivo?'':'disabled style="opacity:0.5;pointer-events:none"';
      const btnClass=pronos[p.id]!==undefined?'guardar-btn enviado':'guardar-btn';
      const textoBtn=pronos[p.id]!==undefined?'ENVIADO ✓':'GUARDAR PRONÓSTICO';
      ui=`
        <div class="pron-controles">
          <button class="gol-btn" ${blockAttr} onclick="edit(${p.id},'l',-1)">-</button>
          <div class="gol-num" id="l_${p.id}">${gt.l}</div>
          <button class="gol-btn" ${blockAttr} onclick="edit(${p.id},'l',1)">+</button>
          <span style="font-weight:900;padding:0 10px; color:#111"> - </span>
          <button class="gol-btn" ${blockAttr} onclick="edit(${p.id},'v',-1)">-</button>
          <div class="gol-num" id="v_${p.id}">${gt.v}</div>
          <button class="gol-btn" ${blockAttr} onclick="edit(${p.id},'v',1)">+</button>
        </div>
        <button class="${btnClass}" ${blockAttr} onclick="save(${p.id})">${textoBtn}</button>
      `;
    }
    html += `
      <div class="card">
        ${idx===0 ? banner : ''}
        <div class="card-header">
          <span>${p.fecha}</span>
          <span class="fecha-badge">${p.fechaTorneo || 'Prode'}</span>
        </div>
        <div class="card-body">
          <div class="equipos">
            <div class="equipo">
              <img src="${ESCUDOS[p.local]||''}" class="escudo-img" onerror="this.style.display='none'">
              <div class="equipo-nom">${p.local}</div>
            </div>
            <div class="vs-box">${jugado ? p.golesL+' - '+p.golesV : 'VS'}</div>
            <div class="equipo">
              <img src="${ESCUDOS[p.visitante]||''}" class="escudo-img" onerror="this.style.display='none'">
              <div class="equipo-nom">${p.visitante}</div>
            </div>
          </div>
          ${ui}
        </div>
      </div>`;
  });
  document.getElementById('tabPartidos').innerHTML=html || '<p style="color:#fff;text-align:center">No hay partidos cargados</p>';
  document.body.classList.toggle('has-pay-banner', sessionStorage.getItem('payBannerShown')==='1' && !usuarioActivo);
}

function edit(id,l,d){
  if(!usuarioActivo) return;
  if(!golesTemp[id]){const p=pronos[id];golesTemp[id]={l:p?p.l:0,v:p?p.v:0}}
  golesTemp[id][l]=Math.max(0,golesTemp[id][l]+d);
  document.getElementById((l==='l'?'l_':'v_')+id).textContent=golesTemp[id][l];
}

async function save(id){
  if(!usuarioActivo) return;
  const g=golesTemp[id] || {l:0,v:0};
  showToast('Guardando...');
  await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'guardarPronostico',usuario,partidoId:id,golesL:g.l,golesV:g.v})});
  pronos[id]={l:g.l,v:g.v};
  showToast('¡Guardado con éxito! 🎯');
  renderAll();
}

function renderPosiciones(){
  let h='';
  posiciones.forEach((p,i)=>h+=`<div class="pos-row"><div class="pos-num">${i+1}</div><div class="pos-nombre">${p.usuario}</div><div class="pos-pts">${p.puntos} pts</div></div>`);
  document.getElementById('tabPosiciones').innerHTML = `<div class="card">${h||'Sin datos'}</div>`;
}

function renderAdmin(){
  const usuariosBase=posiciones.slice();
  const usuariosFiltrados=usuariosBase.filter(u=>{
    const isAct=u.activo===true||u.activo==='TRUE'||u.activo==='true'||u.activo===undefined;
    if(adminFiltro==='bloqueados') return !isAct;
    if(adminFiltro==='activos') return isAct;
    return true;
  });
  const bloqueadosCount=usuariosBase.filter(u=>{
    const isAct=u.activo===true||u.activo==='TRUE'||u.activo==='true'||u.activo===undefined;
    return !isAct;
  }).length;

  let partidosHtml=partidos.map(p=>`
    <div class="admin-row">
      <div style="display:flex; flex-direction:column; max-width:60%">
        <span style="font-size:13px; font-weight:600; color:#333">${p.local} vs ${p.visitante}</span>
        <span style="font-size:10px; color:#16a34a; font-weight:700">${p.fechaTorneo || ''}</span>
      </div>
      <div style="display:flex; align-items:center;">
        <input class="num-input" id="al_${p.id}" type="number" value="${p.golesL||0}">
        <input class="num-input" id="av_${p.id}" type="number" value="${p.golesV||0}">
        <button class="admin-btn" style="padding:6px 10px; font-size:12px" onclick="setRes(${p.id})">✓</button>
      </div>
    </div>`).join('');

  let usuariosHtml=usuariosFiltrados.map(u=>{
    const isAct=u.activo===true||u.activo==='TRUE'||u.activo==='true'||u.activo===undefined;
    return `
      <div class="user-panel-row">
        <div class="user-info-box">
          <span style="font-weight:700; font-size:14px; color:#1e293b">${u.usuario}</span>
          <span style="font-size:11px; color:#64748b">${u.email || 'Sin Mail'}</span>
        </div>
        <button class="toggle-pay-btn ${isAct?'btn-pay-active':'btn-pay-blocked'}" onclick="cambiarEstadoPago('${u.usuario}', ${isAct})">
          ${isAct ? 'Habilitado ✅' : 'Bloqueado ❌'}
        </button>
      </div>`;
  }).join('');

  document.getElementById('tabAdmin').innerHTML = `
    <div class="admin-section">
      <h3>⚙ Configuración WhatsApp</h3>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input class="glass-input" id="waInput" style="margin:0;flex:1;min-width:180px;color:#000;background:#fff" value="${WHATSAPP_NUMERO}">
        <button class="admin-btn" onclick="
          WHATSAPP_NUMERO=document.getElementById('waInput').value.replace(/\\D/g,'');
          localStorage.setItem('whatsapp_prode', WHATSAPP_NUMERO);
          showToast('WhatsApp actualizado');
          renderAll();
        ">Guardar WA</button>
        <button class="admin-btn" onclick="cambiarWhatsAppDesdeAdmin()">Cambiar WA</button>
      </div>
      <div style="margin-top:10px;font-size:12px;color:#64748b">Bloqueados: <b>${bloqueadosCount}</b></div>
      <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">
        <button class="admin-btn" onclick="adminFiltro='todos';renderAdmin()">Todos</button>
        <button class="admin-btn" onclick="adminFiltro='bloqueados';renderAdmin()">Bloqueados</button>
        <button class="admin-btn" onclick="adminFiltro='activos';renderAdmin()">Activos</button>
      </div>
    </div>
    <div class="admin-section">
      <h3>⚽ Cargar Resultados Reales</h3>
      ${partidosHtml || '<p>No hay partidos</p>'}
    </div>
    <div class="admin-section">
      <h3>💵 Control de Pagos e Inscripciones</h3>
      <p style="font-size:11px; color:#64748b; margin-bottom:10px">Todos entran bloqueados. Cuando confirmes el pago, los habilitás desde acá.</p>
      ${usuariosHtml || '<p>No hay usuarios para mostrar</p>'}
    </div>`;
}

async function setRes(id){
  const l=document.getElementById('al_'+id).value, v=document.getElementById('av_'+id).value;
  if(!l||!v) return;
  showToast('Cargando resultado...');
  await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'cargarResultado',partidoId:id,golesL:parseInt(l),golesV:parseInt(v)})});
  showToast('Resultado guardado ✅');
}

async function cambiarEstadoPago(userTarget, estaActivo){
  showToast('Actualizando estado...');
  const nuevoEstado=!estaActivo;
  try{
    await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'toggleUsuarioActivo',usuarioModificar:userTarget,nuevoEstado:nuevoEstado})});
    showToast('¡Usuario modificado con éxito! 🎯');
    const rPos=await fetch(API_URL+'?accion=getPosiciones').then(r=>r.json());
    posiciones=rPos.posiciones;
    renderAdmin();
  }catch(e){showToast('Error al cambiar estado')}
}

function renderAll(){
  renderPartidos();
  renderPosiciones();
  document.getElementById('statPts').textContent=Object.values(pronos).reduce((a,b)=>a+(b.puntos||0),0);
  document.getElementById('statPend').textContent=partidos.filter(p=>!p.jugado && !pronos[p.id]).length;
}

function showToast(m){
  const t=document.getElementById('toast');
  t.textContent=m;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

initVideoBackground();
</script>
</body>
</html>

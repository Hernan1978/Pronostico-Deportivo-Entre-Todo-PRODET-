<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Prode 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  background:#f0f4f8;
  min-height:100vh;
  /* Fondo de estadio de noche sutil para toda la app */
  background-image: linear-gradient(to bottom, rgba(240,244,248,0.92), rgba(240,244,248,0.92)), url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=1200&q=80');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}
.screen{display:none}.screen.active{display:block}

/* ── LOGIN ── */
.login-wrap{
  min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;
  padding:24px;position:relative;overflow:hidden;
}
.login-bg{
  position:absolute;inset:0;
  background-image:url('https://images.unsplash.com/photo-1508098682722-e99c43a406b2?w=1200&q=80');
  background-size:cover;background-position:center;
  filter:brightness(0.4) saturate(1.2);
  z-index:0;
}
.login-overlay{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom, rgba(0,0,0,0.1) 0%, rgba(10,25,50,0.85) 100%);
}
.login-top{position:relative;z-index:2;text-align:center;margin-bottom:28px}
.login-top .logo{font-size:52px;line-height:1;margin-bottom:10px}
.login-top h1{color:#fff;font-size:28px;font-weight:800;letter-spacing:0.04em;text-shadow: 0 2px 10px rgba(0,0,0,0.5)}
.login-top p{color:rgba(255,255,255,0.6);font-size:13px;margin-top:4px;letter-spacing:0.06em;text-transform:uppercase}
.login-card{
  position:relative;z-index:2;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(25px);-webkit-backdrop-filter:blur(25px);
  border:1px solid rgba(255,255,255,0.2);
  border-radius:24px;padding:24px;width:100%;max-width:360px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.field-label{font-size:11px;color:rgba(255,255,255,0.7);display:block;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:0.05em}
.glass-input{
  width:100%;padding:13px 14px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.25);
  background:rgba(0,0,0,0.3);
  color:#fff;font-size:15px;outline:none;
  transition:border-color 0.15s;margin-bottom:12px;
}
.glass-input::placeholder{color:rgba(255,255,255,0.4)}
.glass-input:focus{border-color:rgba(255,255,255,0.6);background:rgba(0,0,0,0.4)}
.btn-login{
  width:100%;padding:14px;border-radius:12px;border:none;
  background:linear-gradient(135deg,#2563eb,#1d4ed8);
  color:#fff;font-size:15px;font-weight:700;cursor:pointer;
  box-shadow:0 4px 20px rgba(37,99,235,0.4);
}

/* Botón ninja original: Abajo a la derecha adentro de la app */
.admin-trigger{
  position:fixed;bottom:0;right:0;
  width:50px;height:50px;
  background:transparent;border:none;cursor:pointer;z-index:99;
}

/* Modal contraseña admin */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.6);
  backdrop-filter:blur(4px);z-index:100;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.modal-overlay.hidden{display:none}
.modal-card{
  background:#1e293b;border-radius:20px;padding:24px;
  width:100%;max-width:320px;border:1px solid rgba(255,255,255,0.08);
  text-align:center;
}
.modal-title{color:#fff;font-size:16px;font-weight:700;margin-bottom:6px}
.dark-input{
  width:100%;padding:12px;border-radius:12px;
  border:1px solid #334155;background:#0f172a;
  color:#fff;font-size:16px;outline:none;margin-bottom:14px;text-align:center;
}
.modal-close{
  background:none;border:none;color:#64748b;
  font-size:13px;cursor:pointer;margin-top:10px;text-decoration:underline;
}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#1a3a5c,#0f2438);padding:16px 16px 12px;position:sticky;top:0;z-index:10}
.header-row{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.header h1{color:#fff;font-size:17px;font-weight:600}
.header-sub{color:rgba(255,255,255,0.5);font-size:12px;margin-top:2px}
.logout-btn{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.7);padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer}
.stats-row{display:flex;gap:8px}
.stat-pill{flex:1;background:rgba(255,255,255,0.1);border-radius:12px;padding:8px;text-align:center}
.stat-val{color:#fff;font-size:19px;font-weight:700}
.stat-lab{color:rgba(255,255,255,0.45);font-size:10px;text-transform:uppercase}

/* ── TABS ── */
.tabs{display:flex;background:#fff;border-bottom:1px solid #eee;position:sticky;top:112px;z-index:9}
.tab{flex:1;padding:12px 8px;font-size:13px;border:none;background:transparent;color:#999;cursor:pointer;border-bottom:2.5px solid transparent;font-weight:500}
.tab.active{color:#1a3a5c;border-bottom-color:#1a3a5c}
.content{padding:12px 12px 80px}

/* ── CARDS ── */
.card{background:#fff;border-radius:16px;margin-bottom:10px;overflow:hidden;box-shadow:0 4px 15px rgba(0,0,0,0.05)}
.card-header{padding:10px 14px;border-bottom:1px solid #f3f4f6;display:flex;justify-content:space-between;align-items:center}
.card-body{padding:14px}
.badge{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600}
.b-green{background:#f0fdf4;color:#16a34a}
.b-blue{background:#eff6ff;color:#2563eb}
.b-yellow{background:#fffbeb;color:#b45309}
.b-gray{background:#f3f4f6;color:#6b7280}
.b-red{background:#fef2f2;color:#dc2626}

/* ── EQUIPOS ── */
.equipos{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px}
.equipo{flex:1;text-align:center}
.escudo-img{width:48px;height:48px;object-fit:contain;margin:0 auto 5px;display:block}
.escudo-fb{font-size:34px;line-height:48px;text-align:center;display:block;margin-bottom:5px}
.equipo-nom{font-size:12px;font-weight:600;color:#1e293b}
.vs-box{flex-shrink:0;text-align:center}
.marcador{font-size:24px;font-weight:800;color:#1a3a5c}
.marcador-sub{font-size:10px;color:#94a3b8}

/* ── PRONÓSTICOS ── */
.pron-section{border-top:1px solid #f3f4f6;padding-top:12px}
.pron-label{font-size:12px;color:#94a3b8;text-align:center;margin-bottom:10px}
.pron-controles{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:12px}
.gol-group{display:flex;align-items:center;gap:8px}
.gol-btn{width:36px;height:36px;border-radius:10px;border:1.5px solid #e5e7eb;background:#f8fafc;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.gol-num{width:44px;height:44px;border-radius:12px;background:#1a3a5c;color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center}
.guardar-btn{width:100%;padding:12px;border-radius:12px;border:none;background:#1a3a5c;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.pron-guardado{display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border-radius:10px;padding:10px 12px}

/* Cartel de Bloqueo por Pago en Pantalla Principal */
.pay-alert{
  background:#fffbeb;border:1px solid #fde68a;border-radius:12px;
  padding:12px;margin-top:10px;font-size:12px;color:#b45309;line-height:1.4;text-align:center
}

/* ── POSICIONES Y ADMIN ── */
.pos-row{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid #f3f4f6}
.pos-row.yo{background:#eff6ff}
.pos-num{font-size:15px;font-weight:700;width:22px;text-align:center;color:#94a3b8}
.pos-avatar{width:38px;height:38px;border-radius:50%;background:#eff6ff;color:#2563eb;font-size:14px;font-weight:700;display:flex;align-items:center;justify-content:center}
.pos-nombre{flex:1;font-size:14px;font-weight:500}
.pos-pts{font-size:16px;font-weight:700;color:#1a3a5c}
.partido-admin{background:#fff;border-radius:12px;padding:12px;margin-bottom:8px}
.num-input{width:50px;padding:8px;border-radius:10px;border:1.5px solid #e5e7eb;text-align:center}
.admin-btn{padding:8px 14px;border-radius:10px;border:none;background:#1a3a5c;color:#fff;font-size:13px;cursor:pointer}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:10px 20px;border-radius:99px;font-size:13px;z-index:200;opacity:0;transition:opacity 0.2s;white-space:nowrap}
.toast.show{opacity:1}
.btn-primary{width:100%;padding:12px;border-radius:12px;border:none;background:#1a3a5c;color:#fff;font-weight:600;cursor:pointer}
</style>
</head>
<body>

<div id="loginScreen" class="screen active">
  <div class="login-wrap">
    <div class="login-bg"></div>
    <div class="login-overlay"></div>

    <div class="login-top">
      <div class="logo">⚽</div>
      <h1>PRODE 2026</h1>
      <p>Torneo Argentino</p>
    </div>

    <div class="login-card">
      <label class="field-label">Nombre completo</label>
      <input class="glass-input" id="loginNombre" placeholder="Ej: Juan Pérez" maxlength="40">

      <label class="field-label">Email</label>
      <input class="glass-input" id="loginEmail" type="email" placeholder="juan@email.com">

      <label class="field-label">Contraseña</label>
      <input class="glass-input" id="loginPass" type="password" placeholder="Mínimo 6 caracteres" maxlength="40">

      <button class="btn-login" id="loginBtn" onclick="doLogin()">Entrar al Prode →</button>
    </div>
  </div>
</div>

<div id="appScreen" class="screen">
  <div class="header">
    <div class="header-row">
      <div>
        <h1 id="headerNombre">Hola!</h1>
        <div class="header-sub" id="headerSub">Cargá tus pronósticos</div>
      </div>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
    <div class="stats-row" id="statsRow">
      <div class="stat-pill"><div class="stat-val">–</div><div class="stat-lab">Puntos</div></div>
      <div class="stat-pill"><div class="stat-val">–</div><div class="stat-lab">Exactos</div></div>
      <div class="stat-pill"><div class="stat-val">–</div><div class="stat-lab">Sin cargar</div></div>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabBtnPartidos" onclick="switchTab('partidos',this)">Partidos</button>
    <button class="tab" onclick="switchTab('posiciones',this)">Posiciones</button>
    <button class="tab" id="adminTabBtn" onclick="switchTab('admin',this)" style="display:none">⚙ Admin</button>
  </div>

  <div id="tabPartidos" class="content"><div class="loading">Cargando...</div></div>
  <div id="tabPosiciones" class="content" style="display:none"><div class="loading">Cargando...</div></div>
  <div id="tabAdmin" class="content" style="display:none"></div>

  <button class="admin-trigger" onclick="abrirModalAdmin()"></button>
</div>

<div class="modal-overlay hidden" id="adminModal">
  <div class="modal-card">
    <div class="modal-title">🔐 Panel de Control</div>
    <p style="color:#64748b;font-size:12px;margin-bottom:12px">Ingresá la contraseña de administrador</p>
    <input class="dark-input" id="adminPinInput" type="password" placeholder="Contraseña">
    <button class="btn-primary" onclick="validarAdminDirecto()">Entrar directo al Panel</button>
    <button class="modal-close" onclick="cerrarModalAdmin()">Cerrar</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API_URL   = 'https://script.google.com/macros/s/AKfycbx3gVgnFx8VdHkjgX0rIav9kAx4OQ9_I8LL7Kii1dY2mnzwoee59bgU5YgRr26XxS0bfw/exec'  
const ADMIN_PIN = '1234'                          
const CONFIG = {
  //aliasMercadoPago: 'prode.hernan.mp', // ← Tu Alias Real acá
  //precioInscripcion: '$2000'
};

const ESCUDOS = {
  'River Plate':   {url:'https://www.thesportsdb.com/images/media/team/badge/xvuwtw1421635011.png',e:'🔴⚪'},
  'Boca Juniors':  {url:'https://www.thesportsdb.com/images/media/team/badge/ttqtr31421635006.png',e:'💙💛'},
  'Racing':        {url:'https://www.thesportsdb.com/images/media/team/badge/racing-club.png',e:'🔵⚪'},
  'Independiente': {url:'https://www.thesportsdb.com/images/media/team/badge/independiente.png',e:'🔴'},
  'San Lorenzo':   {url:'https://www.thesportsdb.com/images/media/team/badge/san-lorenzo.png',e:'🔵🔴'}
}
function escudoHtml(eq) {
  const s = ESCUDOS[eq]; return s?.url ? `<img class="escudo-img" src="${s.url}" onerror="this.outerHTML='<span>⚽</span>'">` : `<span>⚽</span>`
}

let usuario=null, email=null, esAdmin=false, usuarioActivo=true
let partidos=[], pronos={}, posiciones=[], golesTemp={}, usuarios=[]

function abrirModalAdmin() {
  document.getElementById('adminModal').classList.remove('hidden')
  document.getElementById('adminPinInput').focus()
}
function cerrarModalAdmin() {
  document.getElementById('adminModal').classList.add('hidden')
  document.getElementById('adminPinInput').value=''
}

// NUEVO ACCESO: Valida clave y te manda directo a la pestaña de Admin
function validarAdminDirecto() {
  const pin = document.getElementById('adminPinInput').value.trim()
  if (pin !== ADMIN_PIN) { showToast('Contraseña incorrecto ❌'); return }
  cerrarModalAdmin()
  esAdmin = true
  
  // Mostrar pestaña y forzar el salto visual directo a ella
  const adminBtn = document.getElementById('adminTabBtn')
  adminBtn.style.display = ''
  document.getElementById('headerSub').textContent = '⚙ Modo administrador activo'
  showToast('¡Acceso concedido! Bienvenido 👑')
  
  switchTab('admin', adminBtn)
}

async function doLogin() {
  const nombre = document.getElementById('loginNombre').value.trim()
  const mail   = document.getElementById('loginEmail').value.trim()
  if (!nombre || !mail.includes('@')) { showToast('Datos inválidos'); return }

  usuario = nombre; email = mail
  const btn = document.getElementById('loginBtn'); btn.disabled=true

  try {
    await fetch(API_URL, {method:'POST', body:JSON.stringify({accion:'registrarUsuario',usuario,email})})
    const res = await Promise.all([
      fetch(API_URL+'?accion=getPartidos').then(r=>r.json()),
      fetch(API_URL+'?accion=getPronosticos&usuario='+usuario).then(r=>r.json()),
      fetch(API_URL+'?accion=getPosiciones').then(r=>r.json())
    ])
    partidos = res[0].partidos || []; pronos = res[1].pronosticos || []; posiciones = res[2].posiciones || []

    // Revisamos si el usuario figura inactivo en el ranking (si tu Sheets lo maneja)
    const tuInfo = posiciones.find(p => p.usuario === usuario)
    if(tuInfo && tuInfo.activo === false) usuarioActivo = false

    document.getElementById('loginScreen').classList.remove('active')
    document.getElementById('appScreen').classList.add('active')
    document.getElementById('headerNombre').textContent = '¡Hola, ' + nombre.split(' ')[0] + '!'
    renderAll()
  } catch(e) {
    showToast('Error de conexión'); btn.disabled=false
  }
}

function logout() {
  usuario=null; esAdmin=false; usuarioActivo=true
  document.getElementById('adminTabBtn').style.display='none'
  document.getElementById('appScreen').classList.remove('active')
  document.getElementById('loginScreen').classList.add('active')
}

function switchTab(tab,btn) {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  btn.classList.add('active')
  document.getElementById('tabPartidos').style.display   = tab==='partidos'   ? 'block':'none'
  document.getElementById('tabPosiciones').style.display = tab==='posiciones' ? 'block':'none'
  document.getElementById('tabAdmin').style.display      = tab==='admin'      ? 'block':'none'
  if (tab==='admin') renderAdmin()
}

function parseFechaPartido(fechaStr) {
  try {
    const partes = fechaStr.split('·'); if(partes.length < 2) return null
    const diaMes = partes[0].trim().split(' ')[1]
    const [dia, mes] = diaMes.split('/')
    const [hora, min] = partes[1].trim().split(':')
    return new Date(2026, parseInt(mes)-1, parseInt(dia), parseInt(hora), parseInt(min))
  } catch(e) { return null }
}

function renderPartidos() {
  if (!partidos.length) { document.getElementById('tabPartidos').innerHTML='<div class="empty">No hay partidos</div>'; return }
  let html=''
  const ahora = new Date()

  partidos.forEach(p=>{
    const pr=pronos[p.id], tieneP=pr!==undefined
    const gt=golesTemp[p.id]||{l:tieneP?pr.l:0,v:tieneP?pr.v:0}
    
    // Control estricto de tiempo (10 minutos antes)
    const fechaP = parseFechaPartido(p.fecha)
    let tiempoAgotado = false
    if (fechaP && (fechaP.getTime() - ahora.getTime()) / 60000 <= 10) {
      tiempoAgotado = true
    }

    const esSuspendido = p.jugado === 'Suspendido'
    const esJugado = p.jugado === 'Jugado' || p.jugado === true || p.jugado === 'TRUE'

    let pron=''
    if (esSuspendido) {
      pron = `<div style="text-align:center;color:#dc2626;font-size:13px;font-weight:600">⚠️ Partido Suspendido</div>`
    } else if (esJugado) {
      pron = `<div class="pron-guardado"><span>Tu pronóstico: <strong>${tieneP?pr.l:0}–${tieneP?pr.v:0}</strong></span></div>`
    } else {
      if (tiempoAgotado) {
        // BLOQUEO 10 MIN ANTES: No deja cambiar nada
        pron = `<div style="text-align:center;color:#64748b;font-size:13px;padding:8px;background:#f3f4f6;border-radius:10px">⏰ Tiempo límite agotado (Cerró 10 min antes)</div>`
      } else {
        // CONTROL DE PAGO: Si no pagó, botones e inputs totalmente congelados + Mensaje con Alias
        const deshabilitado = !usuarioActivo ? 'disabled style="opacity:0.3; pointer-events:none;"' : ''
        
        pron = `<div class="pron-label">¿Cómo sale el partido?</div>
          <div class="pron-controles">
            <div class="gol-group">
              <button class="gol-btn" ${deshabilitado} onclick="cambiarGol(${p.id},'l',-1)">−</button>
              <div class="gol-num" id="gl_${p.id}">${gt.l}</div>
              <button class="gol-btn" ${deshabilitado} onclick="cambiarGol(${p.id},'l',1)">+</button>
            </div>
            <div class="gol-sep" style="padding:0 6px">–</div>
            <div class="gol-group">
              <button class="gol-btn" ${deshabilitado} onclick="cambiarGol(${p.id},'v',-1)">−</button>
              <div class="gol-num" id="gv_${p.id}">${gt.v}</div>
              <button class="gol-btn" ${deshabilitado} onclick="cambiarGol(${p.id},'v',1)">+</button>
            </div>
          </div>
          <button class="guardar-btn" id="btn_${p.id}" ${deshabilitado} onclick="guardarPron(${p.id})">${tieneP?'✏️ Actualizar':'✅ Guardar pronóstico'}</button>`

        // Si le falta pagar, le clavamos el cartel acá abajo en el panel principal
        if (!usuarioActivo) {
          pron += `
          <div class="pay-alert">
            🔒 <strong>Pronóstico bloqueado por falta de pago:</strong><br>
            Transferí la inscripción de <strong>${CONFIG.precioInscripcion}</strong> al alias:<br>
            <strong style="font-size:14px;color:#1a3a5c">${CONFIG.aliasMercadoPago}</strong><br>
            Pasale el comprobante a Hernán para activar tu cuenta.
          </div>`
        }
      }
    }

    html+=`<div class="card">
      <div class="card-header"><span style="font-size:12px;color:#94a3b8">${p.fecha}</span></div>
      <div class="card-body">
        <div class="equipos">
          <div class="equipo">${escudoHtml(p.local)}<div class="equipo-nom">${p.local}</div></div>
          <div class="vs-box"><div class="marcador">${esJugado?p.golesL+'–'+p.golesV:'VS'}</div></div>
          <div class="equipo">${escudoHtml(p.visitante)}<div class="equipo-nom">${p.visitante}</div></div>
        </div>
        <div class="pron-section">${pron}</div>
      </div>
    </div>`
  })
  document.getElementById('tabPartidos').innerHTML=html
}

function cambiarGol(pid,lado,delta) {
  if(!golesTemp[pid]){const pr=pronos[pid];golesTemp[pid]={l:pr?pr.l:0,v:pr?pr.v:0}}
  golesTemp[pid][lado]=Math.max(0,golesTemp[pid][lado]+delta)
  document.getElementById((lado==='l'?'gl_':'gv_')+pid).textContent=golesTemp[pid][lado]
}

async function guardarPron(pid) {
  const {l,v}=golesTemp[pid]||{l:0,v:0}
  try {
    await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'guardarPronostico',usuario,partidoId:pid,golesL:l,golesV:v})})
    pronos[pid]={l,v}
    showToast('¡Guardado! 🎯')
    renderAll()
  } catch(e){ showToast('Error al guardar') }
}

function renderStats() {
  let pts=0; Object.values(pronos).forEach(p=>pts+=(p.puntos||0))
  document.getElementById('statsRow').innerHTML=`
    <div class="stat-pill"><div class="stat-val">${pts}</div><div class="stat-lab">Puntos</div></div>
    <div class="stat-pill"><div class="stat-val">${partidos.filter(p=>!p.jugado&&!pronos[p.id]).length}</div><div class="stat-lab">Sin cargar</div></div>`
}
function renderPosiciones() {
  let h=''; posiciones.forEach((u,i)=>h+=`<div class="pos-row">
    <div class="pos-num">${i+1}</div><div class="pos-nombre">${u.usuario}</div><div class="pos-pts">${u.puntos} pts</div>
  </div>`); document.getElementById('tabPosiciones').innerHTML=`<div class="card">${h||'Sin datos'}</div>`
}

function renderAdmin() {
  let h=partidos.map(p=>`
    <div class="partido-admin">
      <div style="font-size:13px;font-weight:600">${p.local} vs ${p.visitante}</div>
      <div style="margin-top:6px;display:flex;gap:6px;align-items:center">
        <input class="num-input" id="rl_${p.id}" type="number" placeholder="L">
        <input class="num-input" id="rv_${p.id}" type="number" placeholder="V">
        <button class="admin-btn" onclick="cargarResultadoAdmin(${p.id})">✓ Cargar</button>
      </div>
    </div>`).join('')
  document.getElementById('tabAdmin').innerHTML=`<div class="admin-section"><h3>Cargar Resultados Reales</h3>${h}</div>`
}

async function cargarResultadoAdmin(id) {
  const l=document.getElementById('rl_'+id).value, v=document.getElementById('rv_'+id).value
  if(!l||!v) return
  try {
    await fetch(API_URL,{method:'POST',body:JSON.stringify({accion:'cargarResultado',partidoId:id,golesL:parseInt(l),golesV:parseInt(v)})})
    showToast('Resultado enviado 🚀'); recargarDatos()
  } catch(e){ showToast('Error') }
}

async function recargarDatos() {
  const res = await Promise.all([
    fetch(API_URL+'?accion=getPartidos').then(r=>r.json()),
    fetch(API_URL+'?accion=getPronosticos&usuario='+usuario).then(r=>r.json()),
    fetch(API_URL+'?accion=getPosiciones').then(r=>r.json())
  ])
  partidos = res[0].partidos||[]; pronos = res[1].pronosticos||[]; posiciones = res[2].posiciones||[]
  const tuInfo = posiciones.find(p => p.usuario === usuario)
  if(tuInfo && tuInfo.activo === false) usuarioActivo = false; else usuarioActivo = true
  renderAll()
}

function renderAll(){ renderStats(); renderPartidos(); renderPosiciones(); if(esAdmin) renderAdmin() }
function showToast(m){ const t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),3000) }
</script>
</body>
</html>
